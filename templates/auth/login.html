{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<main class="auth-shell">
    <div class="auth-card" data-aos="fade-up">
        <div class="text-center mb-4">
            <i class="fa-solid fa-lock auth-icon"></i>
            <h1>Welcome back</h1>
            <p>Login to manage reports and AI matches.</p>
        </div>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input class="form-control" type="email" name="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
            </div>
            <button class="btn btn-gradient w-100" type="submit">Login</button>
        </form>
        <p class="text-center mt-4 mb-0">New here? <a href="{{ url_for('auth.register') }}">Create account</a></p>
    </div>
</main>
{% endblock %}
