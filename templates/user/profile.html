{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<main class="dashboard-layout">
    {% include "components/dashboard_sidebar.html" %}
    <section class="dashboard-main">
        <div class="page-title compact"><span>Account</span><h1>Profile settings</h1></div>
        <form class="panel form-panel" method="post" enctype="multipart/form-data">
            <div class="row g-4 align-items-start">
                <div class="col-lg-4 text-center">
                    <img class="profile-preview" id="profilePreview" src="{% if user.profile_image %}{{ url_for('static', filename=user.profile_image) }}{% else %}{{ url_for('static', filename='images/default-avatar.svg') }}{% endif %}" alt="Profile">
                    <input class="form-control mt-3" type="file" name="profile_image" accept="image/*" data-preview="profilePreview">
                </div>
                <div class="col-lg-8">
                    <div class="mb-3">
                        <label class="form-label">Full name</label>
                        <input class="form-control" name="name" value="{{ user.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input class="form-control" name="phone" value="{{ user.phone or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input class="form-control" name="location" value="{{ user.location or '' }}">
                    </div>
                    <button class="btn btn-gradient" type="submit">Update Profile</button>
                </div>
            </div>
        </form>
    </section>
</main>
{% endblock %}
